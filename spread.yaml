project: haproxy-operator
path: /home/ubuntu/proj
kill-timeout: 60m
backends:
  integration-test:
    systems:
    - ubuntu-24.04:
        cpu: 8
        memory: 8
        disk: 40
  tutorial-test:
    systems:
    - ubuntu-24.04:
        cpu: 4
        memory: 8
        disk: 20
environment:
  SUDO_USER: ''
  SUDO_UID: ''
  LANG: C.UTF-8
  LANGUAGE: en
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge.yaml}")'
exclude:
- .git
- .tox
- .venv
- .*_cache
suites:
  tests/integration/:
    summary: integration tests
    backends:
    - integration-test
    environment:
      MODULE/test_haproxy_ddos: test_haproxy_ddos
      MODULE/test_haproxy_route_policy: test_haproxy_route_policy
      MODULE/test_oauth_spoe: test_oauth_spoe
  tests/spread/:
    summary: Automated spread testing
    backends:
    - tutorial-test
    environment:
      TUTORIAL/getting_started: /docs/tutorial/getting-started.md
